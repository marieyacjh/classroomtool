<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Duel Board</title>
    <style>
        :root {
            --top-bar: #5B7E3C;
            --bottom-bar: #C44545;
            --board-bg: #E8F5BD;
            --btn-green: #A2CB8B;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
        body { background-color: var(--board-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Top Navigation & Timer --- */
        #top-nav { 
            background: var(--top-bar); color: var(--text-white); padding: 5px 20px; 
            display: flex; align-items: center; justify-content: space-between; height: 70px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10;
        }
        .timer-wrap { display: flex; align-items: center; gap: 12px; }
        #timer-display { font-size: 2.2rem; font-weight: bold; font-family: monospace; background: #222; padding: 5px 15px; border-radius: 8px; border: 2px solid var(--btn-green); }
        .timer-btn { background: var(--btn-green); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; color: #333; transition: 0.2s; }
        .timer-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
        .mode-toggle { background: white; color: var(--top-bar); border: 2px solid white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 900; }

        /* --- Main Workspace --- */
        #main-container { display: flex; flex: 1; position: relative; overflow: hidden; }

        /* --- Sidebar (Student List & Tabs) --- */
        #sidebar { 
            width: 340px; background: #fdfdfd; border-right: 3px solid var(--top-bar); 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
        }
        #sidebar.hidden { transform: translateX(-340px); width: 0; border: none; }
        
        .tabs { display: grid; grid-template-columns: repeat(7, 1fr); background: #ddd; gap: 2px; padding: 2px; }
        .tab { padding: 8px 2px; border: none; cursor: pointer; font-size: 0.75rem; background: #eee; font-weight: bold; }
        .tab.active { background: var(--top-bar); color: white; }
        
        #student-list { flex: 1; overflow-y: auto; padding: 10px; }
        .student-row { 
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px; 
            background: #fff; border: 1px solid #ddd; border-radius: 8px; transition: 0.2s;
        }
        .student-row.highlight { background: #FFEB3B !important; border-color: #FBC02D; transform: scale(1.02); }
        .student-row.checked { opacity: 0.4; filter: grayscale(1); }
        
        .student-name { flex: 1; border: 1px solid #eee; padding: 4px; border-radius: 4px; font-size: 0.9rem; }
        .score-val { width: 35px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .score-btn { width: 28px; height: 28px; cursor: pointer; background: var(--btn-green); border: none; border-radius: 50%; font-weight: bold; }

        /* --- Drawing Canvas --- */
        #canvas-area { flex: 1; position: relative; overflow: hidden; }
        canvas { display: block; touch-action: none; background: transparent; }
        
        /* Duel Mode UI */
        .duel-divider { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--top-bar); display: none; z-index: 5; border-style: dashed; }
        .big-score-overlay { 
            position: absolute; top: 20px; font-size: 10rem; color: rgba(0,0,0,0.08); 
            font-weight: 900; pointer-events: none; display: none; user-select: none;
        }
        #score-left { left: 15%; }
