<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Tool - Student List Management</title>
</head>
<body>
    <h1>Student List Management</h1>
    <div id="student-list-container">
        <h2>Students</h2>
        <ul id="student-list"></ul>
        <input type="text" id="student-name" placeholder="Enter student name" />
        <button id="add-student-btn">Add Student</button>
    </div>

    <script>
        const studentListContainer = document.getElementById('student-list');
        const studentNameInput = document.getElementById('student-name');
        const addStudentButton = document.getElementById('add-student-btn');

        let students = [];

        const renderStudentList = () => {
            studentListContainer.innerHTML = '';
            students.forEach((student, index) => {
                const li = document.createElement('li');
                li.textContent = student;
                const removeButton = document.createElement('button');
                removeButton.textContent = 'Remove';
                removeButton.onclick = () => removeStudent(index);
                li.appendChild(removeButton);
                studentListContainer.appendChild(li);
            });
        };

        const addStudent = () => {
            const studentName = studentNameInput.value.trim();
            if (studentName) {
                students.push(studentName);
                studentNameInput.value = '';
                renderStudentList();
            }
        };

        const removeStudent = (index) => {
            students.splice(index, 1);
            renderStudentList();
        };

        // Event listener for adding students
        addStudentButton.addEventListener('click', addStudent);
        // Optional: Add an event listener for Enter key press
        studentNameInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                addStudent();
            }
        });
    </script>
</body>
</html>
