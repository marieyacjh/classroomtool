<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Duel Board</title>
    <style>
        :root {
            --top-bar: #5B7E3C;
            --bottom-bar: #C44545;
            --board-bg: #E8F5BD;
            --btn-green: #A2CB8B;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: var(--board-bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- Top Navigation & Timer --- */
        #top-nav { 
            background: var(--top-bar); 
            color: var(--text-white); 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 70px;
            flex-shrink: 0;
            z-index: 100;
        }
        .timer-wrap { display: flex; align-items: center; gap: 8px; }
        #timer-display { 
            font-size: 2rem; 
            font-weight: bold; 
            font-family: monospace; 
            background: #222; 
            padding: 2px 12px; 
            border-radius: 5px; 
            color: #00FF00;
            margin-right: 10px;
        }
        .timer-btn { background: var(--btn-green); border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; color: #333; }
        .mode-toggle { background: white; color: var(--top-bar); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 900; }

        /* --- Main Workspace Layout --- */
        #main-wrapper { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative;
        }

        /* --- SIDEBAR: Student List & Tabs --- */
        #sidebar { 
            width: 350px; 
            background: #f8f9fa; 
            border-right: 3px solid var(--top-bar); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: margin-left 0.3s ease;
            z-index: 50;
        }
        #sidebar.collapsed { margin-left: -350px; }
        
        /* 14 Tabs Grid */
        .tabs-container { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 2px; 
            background: #ccc; 
            padding: 2px;
        }
        .tab { 
            padding: 8px 0; 
            border: none; 
            cursor: pointer; 
            font-size: 0.7rem; 
            background: #eee; 
            font-weight: bold; 
            text-align: center;
        }
        .tab.active { background: var(--top-bar); color: white; }
        
        /* The List of 30 Students */
        #student-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
            background: #fff;
        }
        .student-row { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            margin-bottom: 6px; 
            padding: 5px; 
            background: #fefefe; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
        }
        .student-row.highlight { background: #fff176 !important; border-color: #ffd600; box-shadow: 0 0 10px #ffd600; }
        .student-row.checked { opacity: 0.4; }
        
        .student-name-input { 
            flex: 1; 
            border: 1px solid #ccc; 
            padding: 4px; 
            border-radius: 3px; 
            font-size: 0.9rem; 
        }
        .score-val { width: 30px; text-align: center; font-weight: bold; font-size: 1rem; }
        .score-btn { 
            width: 25px; 
            height: 25px; 
            cursor: pointer; 
            background: var(--btn-green); 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
        }

        /* --- CANVAS AREA --- */
        #canvas-container { 
            flex: 1; 
            position: relative; 
            background: var(--board-bg); 
            overflow: hidden;
        }
        canvas { display: block; touch-action: none; cursor: crosshair; }
        
        /* Duel Elements */
        #duel-line { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            bottom: 0; 
            width: 4px; 
            border-left: 4px dashed var(--top-bar); 
            display: none; 
            pointer-events: none;
        }
        .duel-score { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            font-size: 12rem; 
            color: rgba(0,0,0,0.05); 
            font-weight: 900; 
            pointer-events: none; 
            display: none;
        }
        #score-l { left: 10%; }
        #score-r { right: 10%; }

        /* --- Bottom Tools --- */
        #bottom-bar { 
            background: var(--bottom-bar); 
            color: white; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            align-items: center; 
            flex-shrink: 0;
        }
        .tool-group { display: flex; align-items: center; gap: 10px; }
        .tool-btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; background: white; color: #333; }
        input[type="color"] { width: 40px; height: 40px; border: 2px solid white; border-radius: 5px; cursor: pointer; background: none; }
    </style>
</head>
<body>

    <div id="top-nav">
        <div class="timer-wrap">
            <div id="timer-display">00:00</div>
            <button class="timer-btn" onclick="addTime(60)">+1m</button>
            <button class="timer-btn" onclick="addTime(30)">+30s</button>
            <button class="timer-btn" onclick="addTime(20)">+20s</button>
            <button class="timer-btn" onclick="addTime(10)">+10s</button>
            <button class="timer-btn" style="background:#ff7675" onclick="resetTimer()">Reset</button>
        </div>
        <button class="mode-toggle" id="modeSwitcher" onclick="toggleDuelMode()">SWITCH TO DUEL</button>
    </div>

    <div id="main-wrapper">
        <aside id="sidebar">
            <div class="tabs-container" id="tabs"></div>
            <div id="student-list"></div>
            <div style="padding: 10px; display: flex; gap: 5px; background: #eee;">
                <button class="tool-btn" style="flex:2; background:var(--top-bar); color:white" onclick="pickRandom()">🎲 RANDOM PICK</button>
                <button class="tool-btn" style="flex:1" onclick="clearChecks()">RESET</button>
            </div>
        </aside>

        <main id="canvas-container">
            <div id="duel-line"></div>
            <div class="duel-score" id="score-l">0</div>
            <div class="duel-score" id="score-r">0</div>
            <canvas id="board"></canvas>
        </main>
    </div>

    <footer id="bottom-bar">
        <div class="tool-group">
            <button class="tool-btn" onclick="setTool('pen')">✏️ Pen</button>
            <button class="tool-btn" onclick="setTool('eraser')">🧽 Eraser</button>
            <input type="color" id="brushColor" value="#000000">
            <select id="brushSize" class="tool-btn">
                <option value="3">Thin</option>
                <option value="10" selected>Medium</option>
                <option value="20">Thick</option>
            </select>
        </div>
        <button class="tool-btn" onclick="clearBoard()">🗑️ CLEAR BOARD</button>
    </footer>

    <script>
        // --- State ---
        let currentClass = 0;
        let isDuel = false;
        let tool = 'pen';
        let timeLeft = 0;
        let timerId = null;

        // Load 14 classes x 30 students
        let data = JSON.parse(localStorage.getItem('duelBoardData')) || Array.from({length: 14}, () => 
            Array.from({length: 30}, (_, i) => ({ name: `Student ${i+1}`, score: 0, checked: false }))
        );

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        window.onload = () => {
            renderTabs();
            renderStudents();
            initCanvas();
        };

        function save() { localStorage.setItem('duelBoardData', JSON.stringify(data)); }

        // --- Sidebar Logic ---
        function renderTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            for(let i=0; i<14; i++) {
                const btn = document.createElement('button');
                btn.className = `tab ${i === currentClass ? 'active' : ''}`;
                btn.innerText = `C${i+1}`;
                btn.onclick = () => { currentClass = i; renderTabs(); renderStudents(); };
                container.appendChild(btn);
            }
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            list.innerHTML = '';
            data[currentClass].forEach((s, idx) => {
                const row = document.createElement('div');
                row.className = `student-row ${s.checked ? 'checked' : ''}`;
                row.id = `row-${idx}`;
                row.innerHTML = `
                    <input type="checkbox" ${s.checked ? 'checked' : ''} onchange="updateStudent(${idx}, 'checked', this.checked)">
                    <input type="text" class="student-name-input" value="${s.name}" onchange="updateStudent(${idx}, 'name', this.value)">
                    <button class="score-btn" onclick="addScore(${idx}, -1)">-</button>
                    <div class="score-val">${s.score}</div>
                    <button class="score-btn" onclick="addScore(${idx}, 1)">+</button>
                `;
                list.appendChild(row);
            });
            updateBigScores();
        }

        function updateStudent(idx, key, val) {
            data[currentClass][idx][key] = val;
            save();
            if(key === 'checked') renderStudents();
        }

        function addScore(idx, amt) {
            data[currentClass][idx].score += amt;
            save();
            renderStudents();
        }

        function clearChecks() {
            data[currentClass].forEach(s => s.checked = false);
            save();
            renderStudents();
        }

        function pickRandom() {
            const pool = data[currentClass].map((s, i) => ({...s, i})).filter(s => !s.checked);
            if(pool.length === 0) return alert("All students done!");

            let count = 0;
            const timer = setInterval(() => {
                const rand = Math.floor(Math.random() * 30);
                document.querySelectorAll('.student-row').forEach(r => r.classList.remove('highlight'));
                document.getElementById(`row-${rand}`).classList.add('highlight');
                if(++count > 15) {
                    clearInterval(timer);
                    const winner = pool[Math.floor(Math.random() * pool.length)];
                    document.querySelectorAll('.student-row').forEach(r => r.classList.remove('highlight'));
                    document.getElementById(`row-${winner.i}`).classList.add('highlight');
                    updateStudent(winner.i, 'checked', true);
                }
            }, 100);
        }

        // --- Timer Logic ---
        function addTime(s) {
            timeLeft += s;
            updateTimerDisplay();
            if(!timerId) {
                timerId = setInterval(() => {
                    if(timeLeft > 0) { timeLeft--; updateTimerDisplay(); }
                    else { clearInterval(timerId); timerId = null; }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId); timerId = null;
            timeLeft = 0;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // --- Canvas Logic ---
        function initCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const getXY = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                return {x, y};
            };

            const start = (e) => { isDrawing = true; draw(e); };
            const stop = () => { isDrawing = false; ctx.beginPath(); };
            const draw = (e) => {
                if(!isDrawing) return;
                const {x, y} = getXY(e);
                ctx.lineWidth = document.getElementById('brushSize').value;
                ctx.strokeStyle = tool === 'eraser' ? '#E8F5BD' : document.getElementById('brushColor').value;
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
            canvas.addEventListener('touchend', stop);
        }

        window.onresize = initCanvas;
        function setTool(t) { tool = t; }
        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- Duel Mode Logic ---
        function toggleDuelMode() {
            isDuel = !isDuel;
            const sidebar = document.getElementById('sidebar');
            const switcher = document.getElementById('modeSwitcher');
            const line = document.getElementById('duel-line');
            const sl = document.getElementById('score-l');
            const sr = document.getElementById('score-r');

            if(isDuel) {
                sidebar.classList.add('collapsed');
                line.style.display = 'block';
                sl.style.display = sr.style.display = 'block';
                switcher.innerText = "SWITCH TO CLASS";
                switcher.style.background = "#C44545";
                switcher.style.color = "white";
            } else {
                sidebar.classList.remove('collapsed');
                line.style.display = 'none';
                sl.style.display = sr.style.display = 'none';
                switcher.innerText = "SWITCH TO DUEL";
                switcher.style.background = "white";
                switcher.style.color = "var(--top-bar)";
            }
            // Allow time for sidebar transition before resizing canvas
            setTimeout(initCanvas, 350);
        }

        function updateBigScores() {
            const sorted = [...data[currentClass]].sort((a,b) => b.score - a.score);
            document.getElementById('score-l').innerText = sorted[0]?.score || 0;
            document.getElementById('score-r').innerText = sorted[1]?.score || 0;
        }
    </script>
</body>
</html>
