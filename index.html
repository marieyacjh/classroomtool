<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Duel Board</title>
    <style>
        /* --- COLOR PALETTE & VARIABLES --- */
        :root {
            --bar-top: #5B7E3C;
            --main-board: #E8F5BD;
            --bar-bottom: #C44545;
            --btn-accent: #A2CB8B;
            --white: #ffffff;
            --dark: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--main-board); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- TOP BAR --- */
        #top-bar {
            height: 75px;
            background-color: var(--bar-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .timer-group { display: flex; align-items: center; gap: 8px; }
        #timer-display { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 2.2rem; 
            font-weight: bold; 
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
            margin: 0 10px;
        }

        .btn { 
            border: none; 
            padding: 8px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
            background-color: var(--btn-accent);
            color: var(--dark);
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: translateY(2px); }

        .btn-toggle { background-color: var(--white); color: var(--bar-top); min-width: 130px; }

        /* --- MAIN WORKSPACE --- */
        #workspace { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px;
            background: #fdfdfd;
            border-right: 2px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s ease;
            z-index: 50;
        }
        #sidebar.hidden { margin-left: -320px; }

        .tabs-container {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #eee;
            gap: 1px;
            border-bottom: 2px solid var(--bar-top);
        }
        .tab {
            padding: 8px 2px;
            font-size: 10px;
            text-align: center;
            cursor: pointer;
            background: #ddd;
            font-weight: bold;
        }
        .tab.active { background: var(--white); color: var(--bar-top); }

        #student-list { flex: 1; overflow-y: auto; padding: 10px; }
        .student-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            padding: 5px;
            background: var(--white);
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .student-row.picked { opacity: 0.4; filter: grayscale(1); }
        .student-row.shuffling { background-color: var(--btn-accent); transform: scale(1.02); }

        .stu-input { flex: 1; border: 1px solid #ddd; padding: 4px; border-radius: 3px; font-size: 14px; }
        .stu-score { width: 45px; text-align: center; border: 1px solid #ddd; font-weight: bold; }
        .stu-check { width: 18px; height: 18px; cursor: pointer; }

        /* --- CANVAS --- */
        #canvas-area { flex: 1; position: relative; background-color: var(--main-board); }
        canvas { display: block; touch-action: none; cursor: crosshair; }

        .duel-divider {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 4px;
            background: var(--bar-top); transform: translateX(-50%);
            display: none; z-index: 10;
        }
        .score-overlay {
            position: absolute; top: 100px; font-size: 180px; font-weight: bold;
            color: rgba(91, 126, 60, 0.15); pointer-events: none; display: none;
        }
        #score-left { left: 15%; }
        #score-right { right: 15%; }

        /* --- BOTTOM BAR --- */
        #bottom-bar {
            height: 80px;
            background-color: var(--bar-bottom);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .tool-box { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 50px; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; }
        #duel-ui { display: none; gap: 10px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="timer-group">
            <button class="btn" onclick="addTime(60)">+1m</button>
            <button class="btn" onclick="addTime(30)">+30s</button>
            <button class="btn" onclick="addTime(20)">+20s</button>
            <button class="btn" onclick="addTime(10)">+10s</button>
            <div id="timer-display">00:00</div>
            <button class="btn" style="background: var(--white);" onclick="toggleTimer()" id="timer-btn">START</button>
            <button class="btn" style="background: var(--dark); color: white;" onclick="resetTimer()">RESET</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn" style="background: #FFD700;" onclick="startRandomPicker()">🎲 PICK STUDENT</button>
            <button class="btn btn-toggle" onclick="toggleDuelMode()" id="mode-btn">SWITCH MODE</button>
        </div>
    </div>

    <div id="workspace">
        <aside id="sidebar">
            <div class="tabs-container" id="tabs"></div>
            <div id="student-list"></div>
            <div style="padding: 10px; background: #eee; display: flex; gap: 5px;">
                <button class="btn" style="flex:1; font-size:10px;" onclick="resetClass(false)">RESET SCORES</button>
                <button class="btn" style="flex:1; font-size:10px;" onclick="resetClass(true)">RESET ALL</button>
            </div>
        </aside>

        <main id="canvas-area">
            <div class="duel-divider" id="divider"></div>
            <div class="score-overlay" id="score-left">0</div>
            <div class="score-overlay" id="score-right">0</div>
            <canvas id="canvas"></canvas>
        </main>
    </div>

    <div id="bottom-bar">
        <div class="tool-box">
            <button class="btn" id="pen-btn" style="background: var(--dark); color: white;" onclick="setTool('pen')">PEN</button>
            <button class="btn" id="eraser-btn" style="background: var(--white);" onclick="setTool('eraser')">ERASER</button>
            <input type="color" id="color-picker" value="#333333" onchange="setTool('pen')">
            <input type="range" id="size-slider" min="2" max="50" value="8">
        </div>

        <div id="duel-ui">
            <button class="btn" onclick="updateDuelScore('l', 1)">L +1</button>
            <button class="btn" onclick="updateDuelScore('l', -1)">-1</button>
            <div style="width:20px"></div>
            <button class="btn" onclick="updateDuelScore('r', 1)">R +1</button>
            <button class="btn" onclick="updateDuelScore('r', -1)">-1</button>
        </div>

        <button class="btn" style="background: var(--white); color: var(--bar-bottom);" onclick="clearCanvas()">CLEAR BOARD</button>
    </div>

    <script>
        // --- DATA STATE & PERSISTENCE ---
        let currentTab = 0;
        let classData = JSON.parse(localStorage.getItem('duelBoardData')) || Array.from({length: 13}, (_, i) => ({
            students: Array.from({length: 30}, (_, s) => ({ name: `Student ${s+1}`, score: 0, picked: false }))
        }));

        function save() { localStorage.setItem('duelBoardData', JSON.stringify(classData)); }

        // --- TIMER STATE ---
        let timeLeft = 0;
        let timerInterval = null;

        // --- CANVAS STATE ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let tool = 'pen';
        let isDuel = false;
        let duelScores = { l: 0, r: 0 };

        // --- INITIALIZATION ---
        function init() {
            renderTabs();
            renderStudents();
            resizeCanvas();
            setupDrawing();
            window.addEventListener('resize', resizeCanvas);
        }

        function renderTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            for(let i=0; i<13; i++) {
                const t = document.createElement('div');
                t.className = `tab ${i === currentTab ? 'active' : ''}`;
                t.innerText = `C${i+1}`;
                t.onclick = () => { currentTab = i; renderTabs(); renderStudents(); };
                container.appendChild(t);
            }
        }

        function renderStudents() {
            const list = document.getElementById('student-list');
            list.innerHTML = '';
            classData[currentTab].students.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = `student-row ${s.picked ? 'picked' : ''}`;
                row.id = `stu-${i}`;
                row.innerHTML = `
                    <input type="checkbox" class="stu-check" ${s.picked ? 'checked' : ''} onchange="updateStu(${i}, 'picked', this.checked)">
                    <input type="text" class="stu-input" value="${s.name}" onchange="updateStu(${i}, 'name', this.value)">
                    <input type="number" class="stu-score" value="${s.score}" onchange="updateStu(${i}, 'score', this.value)">
                `;
                list.appendChild(row);
            });
        }

        function updateStu(idx, key, val) {
            classData[currentTab].students[idx][key] = (key === 'score') ? parseInt(val) : val;
            if (key === 'picked') renderStudents();
            save();
        }

        function resetClass(full) {
            classData[currentTab].students.forEach((s, i) => {
                s.score = 0;
                s.picked = false;
                if(full) s.name = `Student ${i+1}`;
            });
            renderStudents();
            save();
        }

        // --- RANDOM PICKER ---
        function startRandomPicker() {
            const students = classData[currentTab].students;
            const available = students.map((s, i) => i).filter(i => !students[i].picked);
            if (available.length === 0) return alert("All students have been picked!");

            let count = 0;
            const shuffle = setInterval(() => {
                const randomIdx = Math.floor(Math.random() * 30);
                document.querySelectorAll('.student-row').forEach(r => r.classList.remove('shuffling'));
                document.getElementById(`stu-${randomIdx}`).classList.add('shuffling');
                count++;
                if (count > 20) {
                    clearInterval(shuffle);
                    document.querySelectorAll('.student-row').forEach(r => r.classList.remove('shuffling'));
                    const winner = available[Math.floor(Math.random() * available.length)];
                    updateStu(winner, 'picked', true);
                    document.getElementById(`stu-${winner}`).scrollIntoView({behavior:'smooth', block:'center'});
                }
            }, 80);
        }

        // --- TIMER FUNCTIONS ---
        function addTime(s) { timeLeft += s; updateTimerDisplay(); }
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        function toggleTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer-btn').innerText = "START";
            } else {
                if (timeLeft <= 0) return;
                document.getElementById('timer-btn').innerText = "PAUSE";
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) { clearInterval(timerInterval); timerInterval = null; alert("Time is up!"); }
                }, 1000);
            }
        }
        function resetTimer() { clearInterval(timerInterval); timerInterval = null; timeLeft = 0; updateTimerDisplay(); document.getElementById('timer-btn').innerText = "START"; }

        // --- DUEL MODE ---
        function toggleDuelMode() {
            isDuel = !isDuel;
            document.getElementById('sidebar').classList.toggle('hidden', isDuel);
            document.getElementById('divider').style.display = isDuel ? 'block' : 'none';
            document.getElementById('duel-ui').style.display = isDuel ? 'flex' : 'none';
            document.getElementById('score-left').style.display = isDuel ? 'block' : 'none';
            document.getElementById('score-right').style.display = isDuel ? 'block' : 'none';
            document.getElementById('mode-btn').innerText = isDuel ? "EXIT DUEL" : "SWITCH MODE";
            
            if(isDuel) { duelScores = { l:0, r:0 }; updateDuelScoreDisplay(); }
            setTimeout(resizeCanvas, 400); // Wait for sidebar transition
        }

        function updateDuelScore(side, val) {
            duelScores[side] = Math.max(0, duelScores[side] + val);
            updateDuelScoreDisplay();
        }
        function updateDuelScoreDisplay() {
            document.getElementById('score-left').innerText = duelScores.l;
            document.getElementById('score-right').innerText = duelScores.r;
        }

        // --- CANVAS DRAWING ---
        function resizeCanvas() {
            const area = document.getElementById('canvas-area');
            const data = ctx.getImageData(0,0, canvas.width, canvas.height);
            canvas.width = area.clientWidth;
            canvas.height = area.clientHeight;
            ctx.putImageData(data, 0, 0);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function setupDrawing() {
            const start = (e) => {
                isDrawing = true;
                const pos = getCoords(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };
            const draw = (e) => {
                if (!isDrawing) return;
                const pos = getCoords(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = (tool === 'eraser') ? '#E8F5BD' : document.getElementById('color-picker').value;
                ctx.lineWidth = document.getElementById('size-slider').value;
                ctx.stroke();
            };
            const stop = () => isDrawing = false;

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stop);
            
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
            canvas.addEventListener('touchend', stop);
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function setTool(t) {
            tool = t;
            document.getElementById('pen-btn').style.boxShadow = (t==='pen') ? '0 0 10px white' : 'none';
            document.getElementById('eraser-btn').style.boxShadow = (t==='eraser') ? '0 0 10px #333' : 'none';
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        init();
    </script>
</body>
</html>
